<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Mum’s Debt Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <div class="card auth-card">
      <h1 class="title">Login</h1>
      <p class="muted">Enter the username and password to open the tracker.</p>

      <div class="grid auth-grid">
        <div>
          <label>Username</label>
          <input id="username" type="text" autocomplete="username" placeholder="Username" />
        </div>

        <div>
          <label>Password</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="Password" />
        </div>

        <div>
          <label>&nbsp;</label>
          <button class="btn-primary" id="loginBtn" type="button">Login</button>
        </div>
      </div>

      <div class="muted" id="loginMsg" aria-live="polite"></div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
